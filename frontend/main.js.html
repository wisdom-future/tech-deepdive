<script>
  // ==================================================================
  //  SECTION 1: CONFIGURATION & DATA ADAPTERS
  // ==================================================================

  // Client-side logging wrapper. Can be toggled for production if needed.
  const CLIENT_LOG_LEVEL = 'DEBUG'; // 'DEBUG', 'INFO', 'WARNING', 'ERROR'
  function clientLogDebug(message, ...args) { if (CLIENT_LOG_LEVEL === 'DEBUG') console.log(message, ...args); }
  function clientLogInfo(message, ...args) { if (['DEBUG', 'INFO'].includes(CLIENT_LOG_LEVEL)) console.info(message, ...args); }
  function clientLogWarning(message, ...args) { if (['DEBUG', 'INFO', 'WARNING'].includes(CLIENT_LOG_LEVEL)) console.warn(message, ...args); }
  function clientLogError(message, ...args) { console.error(message, ...args); }

  const FIELD_CONFIG = {
    _default: [
      { key: 'title', label: '标题', needTrunc: true, linkField: 'sourceUrl' },
      { key: 'date', label: '日期' }, { key: 'infoA', label: '信息 A' },
      { key: 'infoB', label: '信息 B' }, { key: 'id', label: 'ID' },
    ],
    academicPapers: [
      { key: 'title', label: '技术主题', needTrunc: true, linkField: 'sourceUrl' },
      { key: 'infoA', label: '论文作者' }, { key: 'date', label: '发表日期' },
      { key: 'infoB', label: '相关性分' }, { key: 'id', label: '原始ID' },
    ],
    patentData: [
      { key: 'title', label: '专利标题', needTrunc: true, linkField: 'sourceUrl' },
      { key: 'infoA', label: '专利号' }, { key: 'date', label: '申请日期' },
      { key: 'infoB', label: '状态' }, { key: 'id', label: 'ID' },
    ],
    openSourceData: [
      { key: 'title', label: '项目名称', needTrunc: true, linkField: 'sourceUrl' },
      { key: 'date', label: '最新提交' },
      { key: 'infoA', label: '技术领域' },
      { key: 'infoB', label: '项目简介', needTrunc: true },
      { key: 'id', label: 'ID' },
    ],
    techNews: [
      { key: 'title', label: '新闻标题', needTrunc: true, linkField: 'sourceUrl' },
      { key: 'date', label: '发布日期' },
      { key: 'infoA', label: '新闻来源' },
      { key: 'infoB', label: '新闻简介', needTrunc: true },
      { key: 'id', label: 'ID' },
    ],
    industryDynamics: [
      { key: 'title', label: '事件标题', needTrunc: true, linkField: 'sourceUrl' },
      { key: 'date', label: '事件日期' },
      { key: 'infoA', label: '影响级别' },
      { key: 'infoB', label: '状态' },
      { key: 'id', label: 'ID' },
    ],
    techInnovation: [
      { key: 'title', label: '创新点', needTrunc: true, linkField: 'sourceUrl' },
      { key: 'date', label: '更新时间' },
      { key: 'infoA', label: '状态' },
      { key: 'infoB', label: '威胁等级' },
      { key: 'id', label: 'ID' },
    ],
    productRelease: [
      { key: 'title', label: '产品名称', needTrunc: true, linkField: 'sourceUrl' },
      { key: 'date', label: '发布时间' },
      { key: 'infoA', label: '状态' },
      { key: 'infoB', label: '' },
      { key: 'id', label: 'ID' },
    ],
    talentFlow: [
      { key: 'title', label: '流动事件', needTrunc: true, linkField: 'sourceUrl' },
      { key: 'date', label: '时间' },
      { key: 'infoA', label: '状态' },
      { key: 'infoB', label: '' },
      { key: 'id', label: 'ID' },
    ],
    techDomain: [
        { key: 'title', label: '技术名称' }, { key: 'infoA', label: '技术类别' },
        { key: 'infoB', label: '监控状态' }, { key: 'date', label: '创建日期' }, { key: 'id', label: '技术ID' },
    ],
    industryBenchmark: [
        { key: 'title', label: '公司名称', linkField: 'sourceUrl' }, { key: 'infoA', label: '行业类别' },
        { key: 'infoB', label: '威胁等级' }, { key: 'date', label: '上次更新' }, { key: 'id', label: '对手ID' },
    ],
    conference: [
        { key: 'title', label: '会议名称', linkField: 'sourceUrl' }, { key: 'infoA', label: '行业焦点' },
        { key: 'infoB', label: '监控状态' }, { key: 'date', label: '下次活动' }, { key: 'id', label: '会议ID' },
    ],
    // ✅ New: Create a config specifically for history detail
    historyDetail: [
        { key: 'key', label: '属性', width: '30%' },
        { key: 'value', label: '值', width: '70%' },
    ]
  };

  const DataAdapters = {
    academicPapers: item => ({ id: item.raw_id, title: item.title, date: item.publication_date, infoA: item.authors, infoB: item.initial_relevance_score, sourceUrl: item.source_url }),
    patentData: item => ({ id: item.patent_number, title: item.title, date: item.application_date, infoA: item.patent_number, infoB: item.processing_status, sourceUrl: item.source_url }),
    openSourceData: item => ({ id: item.project_name, title: item.project_name, date: item.last_update_timestamp, infoA: item.tech_keywords, infoB: item.description, sourceUrl: item.source_url }),
    techNews: item => ({ id: item.raw_id, title: item.news_title, date: item.publication_date, infoA: item.source_platform, infoB: item.news_summary, sourceUrl: item.source_url }),
    industryDynamics: item => ({ id: item.event_title, title: item.event_title, date: item.event_date, infoA: item.impact_level, infoB: item.processing_status, sourceUrl: item.source_url }),
    _competitorIntelligenceAdapter: item => ({ id: item.intelligence_id, title: item.intelligence_title, date: item.last_update_timestamp, infoA: item.processing_status, infoB: item.threat_level || '', sourceUrl: item.source_url }),
    techInnovation: item => DataAdapters._competitorIntelligenceAdapter(item),
    productRelease: item => DataAdapters._competitorIntelligenceAdapter(item),
    talentFlow: item => DataAdapters._competitorIntelligenceAdapter(item),
    techDomain: item => ({ id: item.tech_id, title: item.tech_name, date: item.created_date, infoA: item.tech_category, infoB: item.monitoring_status, sourceUrl: null }),
    industryBenchmark: item => ({ id: item.competitor_id, title: item.company_name, date: item.last_updated, infoA: item.industry_category, infoB: item.threat_level, sourceUrl: item.website_url }),
    conference: item => ({ id: item.conference_id, title: item.conference_name, date: item.next_event_date, infoA: item.industry_focus, infoB: item.monitoring_status, sourceUrl: item.official_website })
  };

  // ==================================================================
  //  SECTION 2: UTILITY FUNCTIONS
  // ==================================================================\

  function truncate(str, len = 40) { if (str == null) return ''; str = String(str); return str.length > len ? str.slice(0, len) + '...' : str; }
  function handleFailure(error) { const message = error.message || '发生未知错误'; clientLogError('全局错误处理器捕获到错误:', message, error); alert(`错误: ${message}`); }
  
  /**
   * ✅ Core change: Rewrite showHistoryDetailModal to use the main rendering engine
   */
  function showHistoryDetailModal(executionId) {
    App.currentDetailType = 'historyDetail';
    App.allModalData = [];
    App.currentPage = 1;
    App.ui.showDetailListModal(`任务详情: ${executionId}`, 'all');
    document.getElementById('detailTable').innerHTML = '<tbody><tr><td class=\"text-center p-4\" colspan=\"2\">正在加载...</td></tr></tbody>'; // Added colspan
    document.querySelector('#detailModal .modal-footer').style.display = 'none';

    App.callApi('CollectionStatsService', 'getWorkflowExecutionDetail', [executionId])
      .then(detail => {
        if (detail && !detail.error) {
          App.allModalData = Object.entries(detail).map(([key, value]) => ({
            key: key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase()), // Format key, e.g., 'intelligence_id' -> 'Intelligence Id'
            value: value !== null ? value : 'N/A'
          }));
          App.ui.renderPagedKpiDetails();
          document.querySelector('#detailModal .modal-footer').style.display = 'none';
        } else {
          App.allModalData = [{ key: '错误信息', value: detail.error || '未能获取详情。' }];
          App.ui.renderPagedKpiDetails();
          document.querySelector('#detailModal .modal-footer').style.display = 'none';
        }
      })
      .catch(error => {
        App.allModalData = [{ key: '严重错误', value: error.message }];
        App.ui.renderPagedKpiDetails();
        document.querySelector('#detailModal .modal-footer').style.display = 'none';
      });
  }

  // ==================================================================\
  //  SECTION 3: CORE APPLICATION LOGIC\
  // ==================================================================\
\
  const App = {\
    allModalData: [], currentPage: 1, itemsPerPage: 15, currentDetailType: null,\
    reportsHistoryCurrentPage: 1,\
    reportsHistoryItemsPerPage: 15,\
    reportsHistoryTotalPages: 1,\
    reportsHistoryTotalRecords: 0,\
\
    callApi: function(svc, mtd, args = []) {\
      clientLogDebug(`[App.callApi] invoked: ${svc}.${mtd}`); \
      return new Promise((resolve, reject) => {\
        if (typeof google === 'undefined' || !google.script || !google.script.run) {\
          clientLogError(\"ERROR: Frontend cannot connect to backend (google.script.run is undefined).\");\
          return reject(new Error(\"错误：前端无法连接到后端。\"));\
        }\
        google.script.run.withSuccessHandler(res => {\
            clientLogDebug(`[App.callApi] success for ${svc}.${mtd}. Response type: ${typeof res}`);\
            \
            let parsedRes = res;\
            // **Core change: Attempt to parse JSON string**\
            // Check if it's a string and looks like JSON (starts with { or [)\
            if (typeof res === 'string' && (res.startsWith('{') || res.startsWith('['))) { \
                try {\
                    parsedRes = JSON.parse(res);\
                    clientLogDebug(`[App.callApi] Successfully parsed JSON response for ${svc}.${mtd}.`);\
                } catch (e) {\
                    clientLogError(`ERROR: Failed to parse JSON response for ${svc}.${mtd}:`, e);\
                    reject(new Error(`后端返回的响应无法解析为JSON: ${e.message}`));\
                    return; \
                }\
            }\
\
            // **Use parsedRes for checking**\
            if (parsedRes === null) {\
                reject(new Error(\"后端返回了意外的null值。\"));\
            } else if (parsedRes.error) { // If backend explicitly returned { error: \"...\" }\
                reject(new Error(parsedRes.error));\
            } else {\
                resolve(parsedRes); // Successfully parsed and resolved Promise\
            }\
        }).withFailureHandler(reject).callApi(svc, mtd, args);\
      });\
    },\
\
    ui: {\
      renderPagedKpiDetails: function() {\
        const table = document.getElementById('detailTable');\
        const footer = document.querySelector('#detailModal .modal-footer');\
        const noData = document.getElementById('noDataMessage');\
        if (!App.allModalData || App.allModalData.length === 0) { table.innerHTML = ''; noData.style.display = 'block'; footer.style.display = 'none'; return; }\
        noData.style.display = 'none';\
        const totalItems = App.allModalData.length;\
        const totalPages = Math.ceil(totalItems / App.itemsPerPage);\
        const pageData = App.allModalData.slice((App.currentPage - 1) * App.itemsPerPage, App.currentPage * App.itemsPerPage);\
        const displayFields = FIELD_CONFIG[App.currentDetailType] || FIELD_CONFIG._default || [];\
\
        // Responsive table headers\
        const theadHTML = `<thead class=\"bg-gray-50\"><tr>${\
            displayFields.map(f => {\
                const style = f.width ? `style=\"width: ${f.width};\"` : '';\
                return `<th ${style} class=\"px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap\">${f.label}</th>`;\
            }).join('')\
        }</tr></thead>`;\
\
        // ✅ Core change: Add styles to td, and optimize value handling logic\
        // Add data-label for responsive tables\
        const tbodyHTML = `<tbody class=\"bg-white divide-y divide-gray-200\">${\
            pageData.map(item => `<tr>${\
                displayFields.map(f => {\
                    const rawValue = item[f.key];\
                    let displayValue = rawValue !== null ? String(rawValue) : 'N/A';\
\
                    // --- START NEW/MODIFIED LOGIC ---\
                    // Special handling for 'Source Url' field in historyDetail for clickable links\
                    if (App.currentDetailType === 'historyDetail' && f.key === 'value' && item.key === 'Source Url' && rawValue && typeof rawValue === 'string' && (rawValue.startsWith('http://') || rawValue.startsWith('https://'))) {\
                        const truncatedUrlText = truncate(displayValue, 60); \
                        displayValue = `<a href=\"${rawValue}\" target=\"_blank\" rel=\"noopener noreferrer\" class=\"text-blue-600 hover:text-blue-800 hover:underline\">${truncatedUrlText}</a>`;\
                    } else if (f.linkField && item[f.linkField]) { // Existing general link handling logic\
                        const truncatedText = f.needTrunc ? truncate(displayValue) : displayValue;\
                        displayValue = `<a href=\"${item[f.linkField]}\" target=\"_blank\" rel=\"noopener noreferrer\" class=\"text-blue-600 hover:text-blue-800 hover:underline\">${truncatedText}</a>`;\
                    } else if (f.needTrunc) { // Existing general truncation logic\
                        displayValue = truncate(displayValue);\
                    }\
                    // --- END NEW/MODIFIED LOGIC ---\
                    \
                    // Dynamic styles\
                    const style = f.width ? `style=\"width: ${f.width}; max-width: ${f.width};\"` : 'style=\"max-width: 400px;\"'; // Set a max-width for auto-width columns\
                    const classes = \"px-6 py-4 text-sm text-gray-800 whitespace-nowrap overflow-hidden text-ellipsis\";\
\
                    // Add data-label for responsive table (for mobile view)\
                    return `<td class=\"${classes}\" ${style} title=\"${String(rawValue || '').replace(/\"/g, '&quot;')}\" data-label=\"${f.label}\">${displayValue}</td>`;\
                }).join('')\
            }</tr>`).join('')\
        }</tbody>`;\
        table.innerHTML = theadHTML + tbodyHTML;\
        document.getElementById('paginationInfo').textContent = `第 ${App.currentPage} / ${totalPages} 页 (共 ${totalItems} 条)`;\
        document.getElementById('prevPageBtn').disabled = App.currentPage === 1;\
        document.getElementById('nextPageBtn').disabled = App.currentPage === totalPages;\
        footer.style.display = 'flex';\
      },\
      showDetailListModal: function(title, detailKind) {\
        document.getElementById('modalTitle').textContent = `${title} - ${detailKind === 'today' ? '近7日明细' : '全部明细'}`;\
        this.renderPagedKpiDetails();\
        document.getElementById('detailModal').classList.add('flex'); // Use classList for visibility\
        document.getElementById('detailModal').classList.remove('hidden');\
      },\
      handleCollectionCardClick: function(e, pageData) {\
        const card = e.target.closest('.clickable-kpi');\
        if (!card) return;\
        const type = card.dataset.type;\
        const adapter = DataAdapters[type];\
        if (!type || !adapter) return clientLogError(`未找到类型 \"${type}\" 的适配器`);\
        const detailEl = e.target.closest('.clickable-detail');\
        const detailKind = detailEl ? detailEl.dataset.detail : 'all'; // 'today' or 'all'\
        const title = card.querySelector('h3').innerText;\
        App.currentDetailType = type;\
        App.currentPage = 1;\
        let rawData = [];\
        if (pageData.techData && pageData.techData[type]) {\
            rawData = pageData.techData[type];\
        } else if (type === 'industryDynamics') {\
            const ind = (pageData.benchmarkData.industryDynamics || []).filter(item => !this.competitorName || String(item.competitor_name || '').toLowerCase().includes(this.competitorName));\
            const ciNews = (pageData.benchmarkData.competitorIntelligence || []).filter(item => (!this.competitorName || String(item.competitor_name || '').toLowerCase().includes(this.competitorName)) && (item.intelligence_type || '').toLowerCase().replace(/[\s_]/g, '') === 'generalnews')\
                .map(item => ({ event_title: item.intelligence_title, event_date: item.last_update_timestamp, impact_level: item.threat_level, processing_status: item.processing_status, source_url: item.source_url }));\
            rawData = [...ind, ...ciNews];\
        } else {\
            const typeMapping = { 'techInnovation': 'Tech Innovation', 'productRelease': 'Product Release', 'talentFlow': 'Talent Flow' };\
            if (typeMapping[type]) rawData = (pageData.benchmarkData.competitorIntelligence || []).filter(item => (!this.competitorName || String(item.competitor_name || '').toLowerCase().includes(this.competitorName)) && item.intelligence_type === typeMapping[type]);\
        }\
        \
        let dataToAdapt = rawData;\
\
        // **Modification 1: Unified 'today' filtering logic, using 'created_timestamp' and 'last 7 days' range**\
        if (detailKind === 'today') { \
            const ingestionDateFieldMap = {\
                academicPapers: 'created_timestamp', \
                patentData: 'created_timestamp',     \
                openSourceData: 'created_timestamp', \
                techNews: 'created_timestamp',       \
                industryDynamics: 'created_timestamp', \
                techInnovation: 'created_timestamp', \
                productRelease: 'created_timestamp', \
                talentFlow: 'created_timestamp' \
            };\
            const ingestionDateField = ingestionDateFieldMap[type] || 'created_timestamp'; \
\
            const today = new Date();\
            today.setHours(0, 0, 0, 0); \
\
            const sevenDaysAgo = new Date(today);\
            sevenDaysAgo.setDate(today.getDate() - 6); \
            \
            dataToAdapt = rawData.filter(item => { \
                const val = item[ingestionDateField]; \
                if (!val) return false;\
                \
                const itemDateStr = String(val).slice(0, 10);\
                const itemDate = new Date(itemDateStr); \
\
                return !isNaN(itemDate.getTime()) && itemDate >= sevenDaysAgo && itemDate <= today;\
            });\
        }\
        // **Modification 1 End**\
\
        App.allModalData = dataToAdapt.map(adapter);\
\
        // **Modification 2: Sort data before displaying in modal (newest date first)**\
        App.allModalData.sort((a, b) => {\
            const dateA = new Date(a.date);\
            const dateB = new Date(b.date);\
\
            const timeA = isNaN(dateA.getTime()) ? -Infinity : dateA.getTime();\
            const timeB = isNaN(dateB.getTime()) ? -Infinity : dateB.getTime();\
\
            return timeB - timeA; \
        });\
        // **Sorting logic end**\
\
        App.ui.showDetailListModal(title, detailKind); \
      },\
      handleDashboardKpiClick: async function(event) {\
        try{\
          clientLogDebug(\"handleDashboardKpiClick triggered.\"); \
          const card = event.currentTarget;\
          const type = card.dataset.type;\
          const adapter = DataAdapters[type];\
          if (!type || !adapter) return clientLogError(`未找到类型 \"${type}\" 的适配器`);\
          App.currentDetailType = type;\
          App.currentPage = 1;\
          const title = card.querySelector('.kpi-card-title').innerText;\
          document.getElementById('modalTitle').textContent = `${title} - 正在加载...`;\
          document.getElementById('detailTable').innerHTML = '<tbody><tr><td colspan=\"5\" class=\"text-center py-8\">正在加载...</td></tr></tbody>';\
          document.getElementById('noDataMessage').style.display = 'none';\
          document.querySelector('#detailModal .modal-footer').style.display = 'none';\
          document.getElementById('detailModal').classList.add('flex'); // Use classList\
          document.getElementById('detailModal').classList.remove('hidden');\
\
          const methodMap = { techDomain: 'getTechnologyDomainDetails', industryBenchmark: 'getIndustryBenchmarkDetails', conference: 'getConferenceDetails' };\
          const method = methodMap[type];\
          if (!method) { handleFailure(new Error(`未为类型 \"${type}\" 配置后端方法`)); return App.ui.hideDetailModal(); }\
          try {\
              const rawData = await App.callApi('ConfigDataService', method);\
              App.allModalData = rawData.map(adapter);\
              App.ui.showDetailListModal(title, 'all');\
          } catch (e) { handleFailure(e); App.ui.hideDetailModal(); }\
        } catch (outerError) { \
          clientLogError(`FATAL ERROR: handleDashboardKpiClick - Unhandled error in event handler:`, outerError);\
          handleFailure(outerError); \
          App.ui.hideDetailModal();\
        }\
      },\
      prevPage: function() { if (App.currentPage > 1) { App.currentPage--; App.ui.renderPagedKpiDetails(); } },\
      nextPage: function() { if (App.currentPage < Math.ceil(App.allModalData.length / App.itemsPerPage)) { App.currentPage++; App.ui.renderPagedKpiDetails(); } },\
      hideDetailModal: function() { \
        document.getElementById('detailModal').classList.remove('flex');\
        document.getElementById('detailModal').classList.add('hidden');\
      }\
    },\
    init: function() {\
      const trendChartDom = document.getElementById('trend-chart-container');\
      const keywordChartDom = document.getElementById('keyword-cloud-container');\
      const hypeCycleDom = document.getElementById('hype-cycle-chart-container');\
\
      clientLogDebug('trendChartDom:', trendChartDom);\
      clientLogDebug('keywordChartDom:', keywordChartDom);\
      clientLogDebug('hypeCycleDom:', hypeCycleDom); \
\
      const modal = document.getElementById('detailModal');\
      modal.querySelector('.close-button').addEventListener('click', this.ui.hideDetailModal);\
      modal.addEventListener('click', e => { if (e.target.id === 'detailModal') this.ui.hideDetailModal(); });\
      document.getElementById('prevPageBtn').addEventListener('click', this.ui.prevPage);\
      document.getElementById('nextPageBtn').addEventListener('click', this.ui.nextPage);\
      document.querySelectorAll('.nav-link').forEach(l => l.addEventListener('click', e => { e.preventDefault(); this.switchPage(e.currentTarget.dataset.page); }));\
\
      // Mobile menu toggling\
      const mobileMenuBtn = document.getElementById('mobile-menu-button');\
      const mobileMenuOverlay = document.getElementById('mobile-menu-overlay');\
      const closeMobileMenuBtn = document.getElementById('close-mobile-menu');\
      const mobileNavLinks = document.querySelectorAll('#mobile-menu-overlay .nav-link');\
\
      if(mobileMenuBtn) {\
        mobileMenuBtn.addEventListener('click', () => {\
          if(mobileMenuOverlay) mobileMenuOverlay.classList.remove('hidden');\
        });\
      }\
      if(closeMobileMenuBtn) {\
        closeMobileMenuBtn.addEventListener('click', () => {\
          if(mobileMenuOverlay) mobileMenuOverlay.classList.add('hidden');\
        });\
      }\
      mobileNavLinks.forEach(link => {\
        link.addEventListener('click', () => {\
          if(mobileMenuOverlay) mobileMenuOverlay.classList.add('hidden');\
        });\
      });\
\
      this.switchPage('home');\
      document.getElementById('loader').style.display = 'none';\
      clientLogInfo(\"✅ App has been initialized successfully!\");\
    },\
    switchPage: function(pageId) {\
      // 1. Toggle navigation bar highlight state\
      document.querySelectorAll('.nav-link').forEach(l => {\
        l.classList.toggle('bg-primary', l.dataset.page === pageId);\
        l.classList.toggle('shadow-md', l.dataset.page === pageId);\
      });\
\
      // 2. Toggle visibility of page containers\
      document.querySelectorAll('.page-container').forEach(p => {\
        p.classList.toggle('hidden', p.id !== `page-${pageId}`);\
      });\
\
      // ✅ Core change: Force browser repaint and layout\
      const activePageElement = document.getElementById(`page-${pageId}`);\
      if (activePageElement) {\
        void activePageElement.offsetWidth; // Access offsetWidth to force browser synchronous layout\
      }\
\
      // 3. Get initializer function for the corresponding page\
      const pageInitializer = this.pageInitializers[pageId];\
      if (pageInitializer && typeof pageInitializer.init === 'function') {\
        // ✅ Still using setTimeout, but now can rely on it more confidently\
        setTimeout(() => {\
          pageInitializer.init();\
        }, 0); \
      }\
    },\
    pageInitializers: {\
      home: {\
        isInitialized: false,\
        init: async function() {\
          clientLogDebug('正在初始化主页...');\
          if (!this.isInitialized) {\
            document.querySelectorAll('#page-home .kpi-card.clickable-kpi').forEach(c => c.addEventListener('click', App.ui.handleDashboardKpiClick));\
            this.isInitialized = true;\
          }\
          try {\
            document.querySelectorAll('#page-home .kpi-value, #page-home .kpi-today-update, #page-home .status-percentage, #page-home .kpi-category-value').forEach(el => el.classList.add('skeleton'));\
            const [ rawData, insightLeads, techDomains, benchmarks, conferences, health ] = await Promise.all([\
                App.callApi('RawDataStatsService', 'getStats'), App.callApi('InsightLeadStatsService', 'getStats'),\
                App.callApi('ConfigDataService', 'getTechnologyDomainStats'), App.callApi('ConfigDataService', 'getIndustryBenchmarkStats'),\
                App.callApi('ConfigDataService', 'getConferenceStats'), App.callApi('SystemHealthStatsService', 'getStats')\
            ]);\
            document.getElementById('rawDataTotal').textContent = rawData.total.toLocaleString();\

        // ✅ Helper function: Update tech area checkbox status based on period
        updateTechAreasBasedOnPeriod: async function() {
          const selectedPeriodType = document.querySelector('input[name=\"report-period\"]:checked').value;
          const startDateInput = document.getElementById('startDate');
          const endDateInput = document.getElementById('endDate');

          let periodStart, periodEnd;
          const today = new Date();
          today.setHours(0, 0, 0, 0);

          switch (selectedPeriodType) {
            case 'weekly':
              periodEnd = new Date(today);
              periodStart = new Date(today);
              periodStart.setDate(today.getDate() - 7);
              break;
            case 'monthly':
              periodEnd = new Date(today);
              periodStart = new Date(today.getFullYear(), today.getMonth() - 1, 1);
              break;
            case 'quarterly':
              periodEnd = new Date(today);
              periodStart = new Date(today.getFullYear(), today.getMonth() - 3, 1);
              break;
            case 'annual':
              periodEnd = new Date(today);
              periodStart = new Date(today.getFullYear() - 1, 0, 1);
              break;
            case 'custom':
              periodStart = new Date(startDateInput.value);
              periodEnd = new Date(endDateInput.value);
              break;
            default: // Default to weekly if type doesn't match
                periodEnd = new Date(today);
                periodStart = new Date(today);
                if (selectedPeriodType === 'Daily') { /* Period is today */ }
                else { periodStart.setDate(today.getDate() - 7); } // Default weekly
                break;
          }

          // Format dates to YYYY-MM-DD string
          const formatToYYYYMMDD = (date) => {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
          };
          const periodStartStr = formatToYYYYMMDD(periodStart);
          const periodEndStr = formatToYYYYMMDD(periodEnd);

          // If dates are invalid or not selected, do not call backend
          if (isNaN(periodStart.getTime()) || isNaN(periodEnd.getTime())) {
            App.pageInitializers.reports.renderTechAreaCheckboxes(this.allAvailableTechAreas); // Re-render all available, no disabling
            return;
          }

          try {
            const techAreasWithInsights = await App.callApi('ReportsService', 'getTechAreasWithInsightsInPeriod', [periodStartStr, periodEndStr]);
            this.renderTechAreaCheckboxes(this.allAvailableTechAreas, techAreasWithInsights);
          } catch (e) {
            clientLogError("Error updating tech areas based on period:", e);
            // If backend call fails, show all tech areas, no disabling
            this.renderTechAreaCheckboxes(this.allAvailableTechAreas); 
          }

          if (!reportTitle) { alert('请输入报告标题。'); return; }
          if (!reportOwner) { alert('请输入报告负责人。'); return; }
          if (!reportSummary) { alert('请输入报告摘要。'); return; }
          if (selectedPeriodType === 'custom' && (!startDateInput.value || !endDateInput.value)) {
            alert('请选择自定义报告的开始和结束日期。');
            return;
          }

          // 3. Calculate report period dates
          let periodStart, periodEnd;
          const today = new Date();
          today.setHours(0, 0, 0, 0); // Set time to 00:00:00 to avoid losing current day's data

          switch (selectedPeriodType) {
            case 'weekly':
              periodEnd = new Date(today);
              periodStart = new Date(today);
              periodStart.setDate(today.getDate() - 7);
              break;
            case 'monthly':
              periodEnd = new Date(today);
              periodStart = new Date(today.getFullYear(), today.getMonth() - 1, 1);
              break;
            case 'quarterly':
              periodEnd = new Date(today);
              periodStart = new Date(today.getFullYear(), today.getMonth() - 3, 1);
              break;
            case 'annual':
              periodEnd = new Date(today);
              periodStart = new Date(today.getFullYear() - 1, 0, 1);
              break;
            case 'custom':
              periodStart = new Date(startDateInput.value);
              periodEnd = new Date(endDateInput.value);
              break;
            default:
              alert('请选择报告周期。');
              return;
          }

          // Format dates to YYYY-MM-DD string
          const formatToYYYYMMDD = (date) => {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
          };
          const periodStartStr = formatToYYYYMMDD(periodStart);
          const periodEndStr = formatToYYYYMMDD(periodEnd);

          // 4. Call backend API to generate report
          try {
            document.getElementById('generateReportBtn').disabled = true; // Disable button to prevent double click
            document.getElementById('generateReportBtn').textContent = '生成中...';

            const result = await App.callApi('ReportsService', 'generateReport', [
              reportType, 
              reportTitle, 
              periodStartStr, 
              periodEndStr, 
              techAreas, 
              targetAudience, 
              reportOwner, 
              reportSummary,
              recipientEmail
            ]);

            if (result.success) {
              alert('报告生成成功！请在报告历史中查看或下载。');
              // Refresh history
              App.pageInitializers.reports.loadReportsHistory(); 
              // Optional: Clear form
              reportTitleInput.value = '';
              document.getElementById('weekly').checked = true; // Restore default weekly
              App.pageInitializers.reports.toggleCustomDateInputs();
              techAreaCheckboxes.forEach(cb => cb.checked = false); // Uncheck all tech areas
              targetAudienceSelect.value = '技术团队';
              reportOwnerInput.value = '';
              reportSummaryTextarea.value = '';

            } else {
              alert('报告生成失败：' + (result.message || '未知错误。'));
            }
          } catch (e) {
            handleFailure(e);
            alert('报告生成请求失败。详情请查看浏览器控制台。');
          } finally {
            document.getElementById('generateReportBtn').disabled = false;
            document.getElementById('generateReportBtn').textContent = '生成报告';
          }
        }
      }
    }
  };
  window.addEventListener('load', () => App.init());
</script>
